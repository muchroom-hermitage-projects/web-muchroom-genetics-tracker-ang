name: Pull Request Checks

on:
  pull_request:
    branches:
      - main

jobs:
  quality-assurance:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm ci

      - name: Prettier Format Check
        run: npx prettier --check "src/**/*.{ts,html,scss,css,json}"

      - name: Angular Lint
        run: npm run lint

      - name: Unit Tests
        run: npm run test -- --watch=false --browsers=ChromeHeadless
